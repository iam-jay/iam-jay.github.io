<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="CosmosLoadTest dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1224"/>
      <stop offset="1" stop-color="#11203f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="640" height="400" rx="18" fill="url(#bg)"/>
  <!-- title bar -->
  <circle cx="34" cy="32" r="6" fill="#ef4444"/>
  <circle cx="54" cy="32" r="6" fill="#f59e0b"/>
  <circle cx="74" cy="32" r="6" fill="#22c55e"/>
  <text x="110" y="37" fill="#9fb3d1" font-family="Segoe UI, Arial, sans-serif" font-size="15">CosmosLoadTest — report.html</text>

  <!-- summary cards -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="32" y="64" width="120" height="64" rx="10" fill="#16243f" stroke="#243a63"/>
    <text x="46" y="92" fill="#e6eefc" font-size="22" font-weight="700">5,000</text>
    <text x="46" y="112" fill="#7f97bd" font-size="12">Total ops</text>

    <rect x="164" y="64" width="120" height="64" rx="10" fill="#16243f" stroke="#243a63"/>
    <text x="178" y="92" fill="#34d399" font-size="22" font-weight="700">99.9%</text>
    <text x="178" y="112" fill="#7f97bd" font-size="12">Success</text>

    <rect x="296" y="64" width="120" height="64" rx="10" fill="#16243f" stroke="#243a63"/>
    <text x="310" y="92" fill="#e6eefc" font-size="22" font-weight="700">112/s</text>
    <text x="310" y="112" fill="#7f97bd" font-size="12">Throughput</text>

    <rect x="428" y="64" width="180" height="64" rx="10" fill="#16243f" stroke="#243a63"/>
    <text x="442" y="92" fill="#e6eefc" font-size="22" font-weight="700">9 ops</text>
    <text x="442" y="112" fill="#7f97bd" font-size="12">Read·Query·Create·…·Batch</text>
  </g>

  <!-- bar chart: requested vs actual mix -->
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="32" y="168" fill="#9fb3d1" font-size="13">Per-operation throughput</text>
    <line x1="32" y1="340" x2="608" y2="340" stroke="#243a63"/>
    <!-- bars -->
    <g fill="url(#bar)">
      <rect x="56"  y="210" width="44" height="130" rx="4"/>
      <rect x="120" y="180" width="44" height="160" rx="4"/>
      <rect x="184" y="248" width="44" height="92"  rx="4"/>
      <rect x="248" y="288" width="44" height="52"  rx="4"/>
      <rect x="312" y="232" width="44" height="108" rx="4"/>
      <rect x="376" y="262" width="44" height="78"  rx="4"/>
      <rect x="440" y="300" width="44" height="40"  rx="4"/>
      <rect x="504" y="276" width="44" height="64"  rx="4"/>
      <rect x="568" y="312" width="40" height="28"  rx="4"/>
    </g>
    <g fill="#6b82a8" font-size="10" text-anchor="middle">
      <text x="78"  y="356">Read</text>
      <text x="142" y="356">Create</text>
      <text x="206" y="356">Query</text>
      <text x="270" y="356">Del</text>
      <text x="334" y="356">Repl</text>
      <text x="398" y="356">Upsert</text>
      <text x="462" y="356">Patch</text>
      <text x="526" y="356">Feed</text>
      <text x="588" y="356">Batch</text>
    </g>
  </g>
</svg>
