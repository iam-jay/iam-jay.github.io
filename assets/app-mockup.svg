<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="Always-On-Top Tasks app screenshot mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1b27"/>
      <stop offset="1" stop-color="#13131c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="960" height="560" rx="16" fill="url(#bg)"/>

  <!-- Title bar -->
  <text x="32" y="52" fill="#ffffff" font-family="Segoe UI, Arial" font-size="24" font-weight="700">📌 Always-On-Top Tasks</text>
  <text x="800" y="48" fill="#9a9ab0" font-family="Segoe UI, Arial" font-size="13">☑ Always on top</text>

  <!-- Add bar -->
  <rect x="32" y="74" width="780" height="40" rx="8" fill="#262636"/>
  <text x="48" y="99" fill="#6a6a80" font-family="Segoe UI, Arial" font-size="14">Add a task…</text>
  <rect x="822" y="74" width="106" height="40" rx="8" fill="#4caf50"/>
  <text x="845" y="99" fill="#ffffff" font-family="Segoe UI, Arial" font-size="13" font-weight="600">+ Add</text>

  <!-- Columns -->
  <g font-family="Segoe UI, Arial">
    <!-- NEW -->
    <rect x="32" y="130" width="216" height="400" rx="12" fill="#1c1c28"/>
    <text x="48" y="158" fill="#7aa2ff" font-size="14" font-weight="700">🆕 NEW</text>
    <rect x="46" y="172" width="188" height="84" rx="8" fill="#262636"/>
    <text x="60" y="198" fill="#fff" font-size="14" font-weight="600">Draft proposal</text>
    <text x="60" y="220" fill="#9a9ab0" font-size="11">Not started</text>
    <rect x="60" y="230" width="64" height="18" rx="9" fill="#3f8cff"/>
    <text x="72" y="243" fill="#fff" font-size="10">Activate ▶</text>

    <!-- ACTIVE -->
    <rect x="262" y="130" width="216" height="400" rx="12" fill="#1c1c28"/>
    <text x="278" y="158" fill="#ffd54f" font-size="14" font-weight="700">▶ ACTIVE</text>
    <rect x="276" y="172" width="188" height="96" rx="8" fill="#262636"/>
    <text x="290" y="198" fill="#fff" font-size="14" font-weight="600">Fix login bug</text>
    <text x="430" y="190" fill="#ffb74d" font-size="10" font-weight="700">Extended x1</text>
    <text x="290" y="220" fill="#9a9ab0" font-size="10">Start 09:00  End 14:00</text>
    <text x="290" y="240" fill="#66bb6a" font-size="12" font-weight="700">Due in 2h 14m</text>

    <rect x="276" y="278" width="188" height="92" rx="8" fill="#262636"/>
    <text x="290" y="304" fill="#fff" font-size="14" font-weight="600">Ship release</text>
    <text x="290" y="326" fill="#9a9ab0" font-size="10">Start 08:00  End 11:00</text>
    <text x="290" y="346" fill="#ff5252" font-size="12" font-weight="700">OVERDUE 1h 22m</text>

    <!-- DONE -->
    <rect x="492" y="130" width="216" height="400" rx="12" fill="#1c1c28"/>
    <text x="508" y="158" fill="#66bb6a" font-size="14" font-weight="700">✔ DONE</text>
    <rect x="506" y="172" width="188" height="80" rx="8" fill="#262636"/>
    <text x="520" y="198" fill="#fff" font-size="14" font-weight="600">Write tests</text>
    <text x="520" y="220" fill="#9a9ab0" font-size="10">Start 07:00  End 09:00</text>
    <text x="520" y="240" fill="#66bb6a" font-size="12" font-weight="700">Due in 0h 0m</text>

    <!-- CANCEL -->
    <rect x="722" y="130" width="206" height="400" rx="12" fill="#1c1c28"/>
    <text x="738" y="158" fill="#ef5350" font-size="14" font-weight="700">✖ CANCEL</text>
    <rect x="736" y="172" width="178" height="80" rx="8" fill="#262636"/>
    <text x="750" y="198" fill="#fff" font-size="14" font-weight="600">Old experiment</text>
    <text x="750" y="220" fill="#9a9ab0" font-size="10">Start 10:00  End 12:00</text>
    <text x="750" y="240" fill="#ff5252" font-size="12" font-weight="700">OVERDUE 3h 05m</text>
  </g>
</svg>
